<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JANA & YOSSEF ♥ FOREVER</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Cairo',sans-serif;
  background:#B20000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  overflow-x:hidden;
  padding:20px;
}
/* القلوب المتحركة */
.floating-hearts{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0;}
.floating-heart{position:absolute; bottom:-50px; color:rgba(255,255,255,0.15); animation:floatUp ease-in-out forwards;}
@keyframes floatUp{0%{transform:translateY(100vh) scale(0.5);opacity:0;}10%{opacity:0.7;}90%{opacity:0.7;}100%{transform:translateY(-70vh) scale(1);opacity:0;}}

/* المحتوى */
.main-container{position:relative; z-index:10; display:flex; flex-direction:column; align-items:center;}
.names{text-align:center;margin-bottom:24px;}
.names h1{font-family:'Dancing Script',cursive;color:#fff;font-size:2rem;font-weight:700;letter-spacing:2px;}
.names p{font-family:'Dancing Script',cursive;color:rgba(255,255,255,0.8);font-size:1.4rem;margin-top:4px;}
.heart-wrapper{position:relative; display:flex; flex-direction:column; align-items:center; animation:heartbeat 2s ease-in-out infinite; filter:drop-shadow(0 20px 40px rgba(80,0,0,0.6)); margin-bottom:20px;}
.heart-svg{width:280px;height:280px; filter:drop-shadow(0 10px 30px rgba(100,0,0,0.5));}
@keyframes heartbeat{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}

/* الباسورد */
.password-section{display:flex; flex-direction:column; align-items:center; gap:10px; margin-top:20px;}
.password-input, .login-btn{font-size:14px; padding:8px 12px; border-radius:8px; outline:none;}
.password-input{width:200px;}
.login-btn{background:hsl(0,100%,45%); color:#fff; border:none; cursor:pointer;}
.login-btn:hover{background:hsl(0,100%,50%);}

/* علامة القفل + صح */
.lock-icon{font-size:28px;color:#fff;}

/* المستطيل النصي */
#textBox{
  width:80%; /* قابل للتعديل */
  max-width:600px;
  height:200px; /* قابل للتعديل */
  background: rgba(255,255,255,0.1);
  border:2px solid rgba(255,255,255,0.3);
  border-radius:12px;
  padding:15px;
  margin-top:20px;
  color:#fff;
  font-size:16px; /* قابل للتعديل */
  overflow-y:auto;
  display:none;
  box-shadow:0 8px 20px rgba(0,0,0,0.5);
}

/* زر الموسيقى */
#playBtn{
  position:fixed;
  top:10px;
  right:10px;
  z-index:1000;
  padding:8px 12px;
  font-size:14px;
  cursor:pointer;
}

</style>
</head>
<body>

<div class="floating-hearts" id="floatingHearts"></div>

<div class="main-container">
  <div class="names">
    <h1>♥ JANA & YOSSEF ♥</h1>
    <p>FOREVER</p>
  </div>

  <div class="heart-wrapper">
    <svg class="heart-svg" viewBox="0 0 512 512">
      <path d="M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z" fill="hsl(0,100%,45%)"/>
    </svg>
  </div>

  <div class="password-section">
    <div class="lock-icon" id="lockIcon">🔒</div>
    <input type="password" class="password-input" id="passwordInput" placeholder="ادخل كلمة السر">
    <button class="login-btn" id="loginBtn">دخول</button>
  </div>

  <!-- المستطيل النصي -->
  <div id="textBox"></div>

</div>

<!-- الموسيقى -->
<audio id="myAudio" loop>
  <source src="Albumaty.Com_ahmd_gmal_bhbk.mp3" type="audio/mpeg">
  متصفحك لا يدعم تشغيل الصوت
</audio>
<button id="playBtn">تشغيل الموسيقى</button>

<script>
// ===== القلوب =====
function createFloatingHeart(){
  const container=document.getElementById("floatingHearts");
  const heart=document.createElement("div");
  heart.classList.add("floating-heart");
  heart.textContent="♥";
  heart.style.left=Math.random()*100+"%";
  heart.style.fontSize=(20+Math.random()*25)+"px";
  heart.style.animationDuration=(6+Math.random()*6)+"s";
  container.appendChild(heart);
  setTimeout(()=>heart.remove(),12000);
}
for(let i=0;i<8;i++){setTimeout(createFloatingHeart,i*500);}
setInterval(createFloatingHeart,1500);

// ===== الموسيقى =====
const audio=document.getElementById('myAudio');
const playBtn2=document.getElementById('playBtn');
playBtn2.addEventListener('click',()=>{
  if(audio.paused){audio.play(); playBtn2.textContent='إيقاف الموسيقى';}
  else{audio.pause(); playBtn2.textContent='تشغيل الموسيقى';}
});

// ===== الباسورد =====
const passwordInput=document.getElementById('passwordInput');
const loginBtn=document.getElementById('loginBtn');
const lockIcon=document.getElementById('lockIcon');
const textBox=document.getElementById('textBox');

const message="هنا يمكنك كتابة النص الذي تريد أن يظهر تدريجيًا داخل المستطيل. يمكنك التحكم في العرض والارتفاع وحجم الخط وسرعة الكتابة بسهولة.";

loginBtn.addEventListener('click',tryLogin);
passwordInput.addEventListener('keydown',function(e){if(e.key==='Enter') tryLogin();});

function tryLogin(){
  if(passwordInput.value==="1052024"){
    passwordInput.disabled=true;
    loginBtn.disabled=true;
    lockIcon.textContent="🔓 ✅";

    // اظهار المستطيل
    textBox.style.display="block";
    typeText(message, textBox,50); // 50ms بين كل حرف، يمكن تغيير السرعة
  }
}

// ===== typing effect =====
function typeText(text, element, speed){
  let i=0;
  function typing(){
    if(i<text.length){
      element.innerHTML+=text.charAt(i);
      i++;
      setTimeout(typing,speed);
    }
  }
  typing();
}
</script>

</body>
</html>
