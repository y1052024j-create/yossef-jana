<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JANA & YOSSEF ♥ FOREVER</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: #B20000;
      min-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
      position: relative;
    }

    .floating-hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .floating-heart {
      position: absolute;
      bottom: -50px;
      color: rgba(255, 255, 255, 0.15);
      animation: floatUp ease-in-out forwards;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
      10% { opacity: 0.7; }
      90% { opacity: 0.7; }
      100% { transform: translateY(-70vh) scale(1); opacity: 0; }
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .main-container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      width: 100%;
    }

    .names {
      text-align: center;
      margin-bottom: 24px;
      margin-top: 50px;
    }

    .names h1 {
      font-family: 'Dancing Script', cursive;
      color: #fff;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .names p {
      font-family: 'Dancing Script', cursive;
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.4rem;
      margin-top: 4px;
    }

    .heart-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: heartbeat 2s ease-in-out infinite;
      filter: drop-shadow(0 20px 40px rgba(80, 0, 0, 0.6));
      margin-bottom: 20px;
    }

    .heart-svg {
      width: 280px;
      height: 280px;
      filter: drop-shadow(0 10px 30px rgba(100, 0, 0, 0.5));
    }

    .timer-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 16px;
    }

    .timer {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .timer-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .timer-value {
      color: #fff;
      font-weight: 700;
      font-size: 1.2rem;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .timer-label {
      color: rgba(255, 255, 255, 0.7);
      font-size: 10px;
      margin-top: 4px;
    }

    .password-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
      width: 100%;
      max-width: 260px;
    }

    .lock-icon {
      color: rgba(255, 255, 255, 0.7);
      font-size: 28px;
    }

    .password-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      padding: 10px 16px;
      text-align: center;
      color: #fff;
      font-size: 14px;
      outline: none;
    }

    .login-btn {
      width: 100%;
      background: hsl(0, 100%, 45%);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
    }

    .error-msg { color: white; font-size: 12px; }
    .hidden { display: none; }

    /* ===== المستطيل الزجاجي المضاف ===== */
    #secretContent {
      display: none;
      width: 100%;
      margin-top: 40px;
      justify-content: center;
      align-items: center;
    }

    .text-box-container {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .text-box {
      width: 90%;
      max-width: 650px;
      height: 350px;

      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);

      border-radius: 30px;

      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);

      padding: 25px;
      color: white;
      font-size: 15px;
      line-height: 1.8;
      overflow-y: auto;
      text-align: center;
    }

    .text-end {
      margin-top: 20px;
      text-align: center;
      font-weight: bold;
      color: white;
    }

  </style>
</head>
<body>

<div class="floating-hearts" id="floatingHearts"></div>

<div class="main-container">

<div class="names">
<h1>♥ JANA & YOSSEF ♥</h1>
<p>FOREVER</p>
</div>

<div class="heart-wrapper">
<svg class="heart-svg" viewBox="0 0 512 512">
<path d="M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z" fill="hsl(0, 100%, 45%)"/>
</svg>
<div class="timer-overlay">
<div class="timer" id="timer"></div>
</div>
</div>

<div class="password-section" id="passwordSection">
<div class="lock-icon">🔒</div>
<input type="password" class="password-input" id="passwordInput" placeholder="ادخل كلمة السر" />
<button class="login-btn" id="loginBtn">ظهور</button>
<p class="error-msg hidden" id="errorMsg">كلمة المرور خاطئة</p>
</div>

<div id="secretContent">
<div class="text-box-container">
<div class="text-box" id="textBox"></div>
<div class="text-end" id="textEnd">هنا النص في نهاية المستطيل ✨</div>
</div>
</div>

</div>

<script>
const passwordInput = document.getElementById("passwordInput");
const loginBtn = document.getElementById("loginBtn");
const secretContent = document.getElementById("secretContent");

loginBtn.onclick = function(){
if(passwordInput.value === "1052024"){
secretContent.style.display = "flex";
}
}
</script>

</body>
</html>
