<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>♥JANA & YOSSEF♥ FOREVER</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {margin:0; padding:0; box-sizing:border-box;}
    body {
      font-family: 'Cairo', sans-serif;
      background: #B20000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ===== القلوب الطايرة ===== */
    .floating-hearts {
      position: fixed;
      inset:0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .floating-heart {
      position: absolute;
      bottom: -50px;
      color: rgba(255,255,255,0.3);
      font-size: 25px;
      animation: floatUp ease-in-out forwards;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0.5); opacity:0; }
      10% { opacity:0.7; }
      90% { opacity:0.7; }
      100% { transform: translateY(-70vh) scale(1); opacity:0; }
    }

    /* ===== القلب الكبير ===== */
    .heart-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 15px 30px rgba(0,0,0,0.5));
    }
    .heart-svg {
      width: 300px;
      height: 300px;
      fill: red;
      animation: heartbeat 2s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%,100% {transform: scale(1);}
      50% {transform: scale(1.05);}
    }

    /* ===== العداد ===== */
    .timer-overlay {
      position: absolute;
      display:flex;
      flex-direction: row;
      gap: 8px;
      top:50%;
      transform: translateY(-50%);
      flex-wrap: wrap;
      justify-content:center;
      align-items:center;
    }
    .timer-unit {display:flex; flex-direction:column; align-items:center;}
    .timer-value {color:#fff; font-weight:700; font-size:1.2rem;}
    .timer-label {color: rgba(255,255,255,0.8); font-size:12px;}

    /* ===== النصوص فوق القلب ===== */
    .names {text-align:center; margin-bottom:20px; z-index:15;}
    .names h1 {font-family:'Dancing Script', cursive; color:#fff; font-size:2rem;}
    .names p {font-family:'Dancing Script', cursive; color:rgba(255,255,255,0.8); font-size:1.4rem; margin-top:5px;}

    /* ===== قسم الباسورد ===== */
    .password-section {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      margin-top:20px;
      width: 100%;
      max-width:260px;
      z-index:15;
    }
    .lock-icon {color: rgba(255,255,255,0.7); font-size:28px;}
    .password-input {
      width:100%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,0.3);
      border-radius:10px;
      padding:10px;
      text-align:center;
      color:#fff;
      font-size:14px;
      outline:none;
    }
    .password-input::placeholder {color: rgba(200,200,200,0.7);}
    .login-btn {
      width:100%;
      background: hsl(0,100%,45%);
      color:#fff;
      border:none;
      border-radius:10px;
      padding:10px;
      font-weight:700;
      font-size:14px;
      cursor:pointer;
    }
    .login-btn:hover {background:hsl(0,100%,50%);}
    .error-msg {color:#fff; font-size:12px; display:none;}
  </style>
</head>
<body>

  <!-- قلوب متحركة -->
  <div class="floating-hearts" id="floatingHearts"></div>

  <div class="heart-wrapper">
    <!-- النصوص فوق القلب -->
    <div class="names">
      <h1>♥ JANA & YOSSEF ♥</h1>
      <p>FOREVER</p>
    </div>

    <!-- القلب الكبير -->
    <svg class="heart-svg" viewBox="0 0 512 512">
      <path d="M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z"/>
    </svg>

    <!-- العداد -->
    <div class="timer-overlay">
      <div class="timer" id="timer"></div>
    </div>

    <!-- قسم الباسورد -->
    <div class="password-section" id="passwordSection">
      <div class="lock-icon">🔒</div>
      <input type="password" class="password-input" id="passwordInput" placeholder="ادخل كلمة السر" />
      <button class="login-btn" id="loginBtn">دخول</button>
      <p class="error-msg" id="errorMsg">كلمة المرور خاطئة، حاول تاني ❌</p>
    </div>
  </div>

  <!-- الأغنية -->
  <audio id="loveSong" autoplay loop>
    <source src="https://example.com/w-enta-ma3aya.mp3" type="audio/mpeg">
  </audio>

<script>
  // ===== العداد =====
  const START_DATE = new Date(3024, 4, 10, 18, 0, 0); // 10/5/3024 الساعة 6 مساءً
  function updateTimer() {
    const now = new Date();
    let diff = now - START_DATE;
    const seconds = Math.floor(diff/1000);
    const minutes = Math.floor(seconds/60);
    const hours = Math.floor(minutes/60);
    const days = Math.floor(hours/24);
    const years = Math.floor(days/365.25);

    const remainingDays = days - Math.floor(years*365.25);
    const remainingHours = hours %24;
    const remainingMinutes = minutes %60;
    const remainingSeconds = seconds %60;

    const units = [
      {label:"سنة", value:years},
      {label:"يوم", value:remainingDays},
      {label:"ساعة", value:remainingHours},
      {label:"دقيقة", value:remainingMinutes},
      {label:"ثانية", value:remainingSeconds},
    ];

    const timerEl = document.getElementById("timer");
    timerEl.innerHTML = units.map(u=>`<div class="timer-unit"><span class="timer-value">${String(u.value).padStart(2,'0')}</span><span class="timer-label">${u.label}</span></div>`).join('');
  }
  updateTimer();
  setInterval(updateTimer,1000);

  // ===== القلوب الطايرة =====
  function createFloatingHeart() {
    const container = document.getElementById("floatingHearts");
    const heart = document.createElement("div");
    heart.classList.add("floating-heart");
    heart.textContent="♥";
    heart.style.left = Math.random()*100 + "%";
    heart.style.fontSize = (20 + Math.random()*20)+"px";
    heart.style.animationDuration = (5 + Math.random()*5)+"s";
    container.appendChild(heart);
    setTimeout(()=>heart.remove(),12000);
  }
  for(let i=0;i<6;i++) setTimeout(createFloatingHeart,i*500);
  setInterval(createFloatingHeart,1500);

  // ===== الباسورد =====
  const passwordInput = document.getElementById("passwordInput");
  const loginBtn = document.getElementById("loginBtn");
  const errorMsg = document.getElementById("errorMsg");
  const passwordSection = document.getElementById("passwordSection");

  loginBtn.addEventListener("click", tryLogin);
  passwordInput.addEventListener("keydown", function(e){
    if(e.key==="Enter") tryLogin();
    errorMsg.style.display="none";
  });

  function tryLogin(){
    if(passwordInput.value === "1052024"){
      window.location.href="page2.html"; // لو صح يفتح صفحة ثانية
    } else {
      errorMsg.style.display="block";
      setTimeout(()=>errorMsg.style.display="none",2500);
    }
  }
</script>
</body>
</html>
